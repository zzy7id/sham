<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA Redesign</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .page1 { 
            background-color: #1C85C7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        .logo {
            margin-bottom: 20px;
        }
        .input-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
        }
        .input-field {
            flex: 1;
            padding: 10px;
            margin: 5px;
            border: 1px solid white;
            border-radius: 5px;
            background-color: white;
            color: #1C85C7;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
        }
        .button {
            background-color: white;
            color: #1C85C7;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .page2 {
            display: none;
            padding: 20px;
            background-color: white;
        }
        .header {
            background-color: #1C85C7;
            display: flex;
            align-items: center;
            padding: 10px;
            color: white;
        }
        .back-arrow {
            margin-right: 10px;
        }
        .indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: gray;
            margin: 5px;
        }
        .link {
            color: #1C85C7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="page1">
        <img src="path_to_dana_logo" class="logo" alt="DANA Logo">
        <div class="instruction">Masukkan nomor HP kamu untuk lanjut</div>
        <div class="input-container">
            <input type="text" class="input-field" placeholder="Negara (+62)" />
            <input type="text" class="input-field" placeholder="811-1234-5678" />
        </div>
        <div class="footer">Terms and conditions</div>
        <button class="button">LANJUTKAN</button>
    </div>
    <div class="page2">
        <div class="header">
            <span class="back-arrow">←</span>
            <h1>Masuk</h1>
        </div>
        <div>Masukkan PIN</div>
        <div>
            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
        </div>
        <a href="#" class="link">LUPA PIN?</a>
    </div>
    <script>
        // Add functionality to switch between pages
        document.querySelector('.button').addEventListener('click', function() {
            document.querySelector('.page1').style.display = 'none';
            document.querySelector('.page2').style.display = 'block';
        });
    </script>
</body>
</html>
