<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA Login Redesign</title>
    <style>
        body {
            background-color: #1C85C7;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #145B89;
        }
        header button {
            background-color: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }
        .input-container {
            margin: 20px;
        }
        .input-container input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
        }
        .pin-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .pin-indicator div {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background-color: white;
            margin: 0 5px;
        }
        .notification {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #FF5733;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }
        @media (max-width: 600px) {
            .input-container {
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <button onclick="goBack()">Back</button>
        <h1>DANA Login</h1>
    </header>
    <div class="input-container">
        <select id="country-code">
            <option value="+1">🇺🇸 +1</option>
            <option value="+62">🇮🇩 +62</option>
            <option value="+44">🇬🇧 +44</option>
            <!-- Add more countries as needed -->
        </select>
        <input type="tel" id="phone" placeholder="Phone Number" required />
        <div class="pin-indicator" id="pin-indicator">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <input type="password" id="pin" placeholder="Enter PIN" maxlength="6" required />
    </div>
    <div class="notification" id="notification">Notification Message</div>
    <script>
        function goBack() {
            window.history.back();
        }

        // Simulating audio playback feature
        function playPrankAudio() {
            const audio = new Audio('path-to-audio.mp3'); // Replace with your audio file path
            audio.play();
        }

        // Form validation and geolocation functionality
        document.getElementById('phone').addEventListener('input', function (e) {
            // Auto-formatting phone input (add your logic)
        });

        document.getElementById('pin').addEventListener('input', function () {
            const pin = this.value;
            const indicators = document.querySelectorAll('.pin-indicator div');
            indicators.forEach((div, index) => {
                div.style.backgroundColor = index < pin.length ? 'green' : 'white';
            });
        });

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.innerText = message;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
