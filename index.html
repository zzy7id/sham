<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .page1 {
            background-color: #1C85C7;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
        }
        .country-selector {
            display: inline-block;
            margin-top: 10px;
        }
        .btn {
            background-color: white;
            color: #1C85C7;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
        }
        .hidden {
            display: none;
        }
        .circles {
            display: inline-block;
            margin-top: 10px;
        }
        .circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            display: inline-block;
            margin: 5px;
            background: gray;
        }
        .circle.filled {
            background: blue;
        }
        @media (max-width: 380px) {
            .container {
                max-width: 100%;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container page1">
        <img src="/path/to/dana-logo.png" alt="DANA Logo"/>
        <h2>Masukkan nomor HP kamu untuk lanjut</h2>
        <div class="country-selector">
            <span>🇮🇩 +62 </span>
            <input type="text" placeholder="811-1234-5678"/>
        </div>
        <button class="btn" onclick="goToPage2()">LANJUTKAN</button>
        <div class="footer">
            <p>About terms...</p>
        </div>
    </div>
    <div class="container page2 hidden">
        <header style="background-color: #1C85C7; padding: 10px; display: flex; align-items: center;">
            <button onclick="goBack()">←</button>
            <h1>Masuk</h1>
        </header>
        <div style="background: white; padding: 20px; text-align: center;">
            <h2>Masukkan PIN</h2>
            <div class="circles">
                <div class="circle" id="circle1"></div>
                <div class="circle" id="circle2"></div>
                <div class="circle" id="circle3"></div>
                <div class="circle" id="circle4"></div>
                <div class="circle" id="circle5"></div>
                <div class="circle" id="circle6"></div>
            </div>
            <a href="#" onclick="forgotPin()">Lupa PIN?</a>
            <input type="password" class="hidden" id="pinInput" maxlength="6" oninput="updateCircles()"/>
        </div>
    </div>
    <script>
        function goToPage2() {
            document.querySelector('.page1').classList.add('hidden');
            document.querySelector('.page2').classList.remove('hidden');
        }
        function goBack() {
            document.querySelector('.page2').classList.add('hidden');
            document.querySelector('.page1').classList.remove('hidden');
        }
        function updateCircles() {
            const input = document.getElementById('pinInput');
            const circles = document.querySelectorAll('.circle');
            circles.forEach((circle, index) => {
                circle.classList.toggle('filled', index < input.value.length);
            });
        }
        function forgotPin() {
            alert('Forgot PIN functionality');
        }
    </script>
</body>
</html>
