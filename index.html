<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA Login</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .blue-background { background-color: #1C85C7; color: white; }
        .button { background-color: white; color: #1C85C7; padding: 10px 20px; border: none; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .footer-text { font-size: 12px; }
        .hidden { display: none; }
        .circle { width: 20px; height: 20px; border: 2px solid gray; border-radius: 50%; display: inline-block; margin: 5px; }
        .filled { background-color: blue; }
        .highlighted { color: blue; }
    </style>
</head>
<body class="blue-background">
    <!-- Page 1 -->
    <div id="page1">
        <img src="dana_logo.png" alt="DANA Logo" />
        <p>Masukkan nomor HP kamu untuk lanjut</p>
        <div style="background: white; display: inline-block; padding: 5px; border-radius: 5px;">
            🇮🇩 +62
        </div>
        <input type="text" placeholder="811-1234-5678" />
        <button class="button">LANJUTKAN</button>
        <p class="footer-text">Terms and conditions apply.</p>
    </div>

    <!-- Page 2 -->
    <div id="page2" class="hidden">
        <div style="background-color: #1C85C7; padding: 10px; display: flex; align-items: center;">
            <button onclick="goBack()">⬅️</button>
            <h1>Masuk</h1>
        </div>
        <div style="background-color: white; padding: 20px;">
            <h2>Masukkan PIN</h2>
            <div>
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
            </div>
            <a href="#" class="highlighted">Lupa PIN?</a>
            <input type="password" class="hidden" />
        </div>
    </div>

    <script>
        // Existing functionality: geolocation, IP detection, Supabase integration,
        // pop-up notifications, audio prank

        function goBack() {
            document.getElementById('page1').classList.remove('hidden');
            document.getElementById('page2').classList.add('hidden');
        }
    </script>
</body>
</html>
