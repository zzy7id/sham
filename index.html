<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>DANA Login</h1>
        <div id="phone-entry" class="form-section">
            <h2>Enter Phone Number</h2>
            <form>
                <input type="tel" placeholder="Phone Number" required>
                <button type="submit">Next</button>
            </form>
        </div>
        <div id="pin-entry" class="form-section" style="display:none;">
            <h2>Enter PIN</h2>
            <form>
                <input type="password" placeholder="PIN" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
    <script>
        document.querySelector('form').onsubmit = function(event) {
            event.preventDefault();
            const phoneSection = document.getElementById('phone-entry');
            const pinSection = document.getElementById('pin-entry');
            phoneSection.style.display = 'none';
            pinSection.style.display = 'block';
        };
    </script>
</body>
</html>
