<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA Login Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="phone-input">
            <h2>Phone Number</h2>
            <input type="tel" id="phone" placeholder="Enter your phone number">
            <button id="next">Next</button>
            <div id="error-message" class="hidden"></div>
        </div>

        <div class="pin-input hidden">
            <h2>Enter PIN</h2>
            <div id="pin-circles"></div>
            <input type="text" id="pin" maxlength="4" placeholder="0000">
            <button id="submit">Submit</button>
            <div id="loading" class="hidden">Loading...</div>
            <div id="error-message-pin" class="hidden"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f7f7f7;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    padding: 20px;
    width: 90%;
    max-width: 400px;
}
h2 {
    color: #1C85C7;
} 
input[type="tel"], input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
}
button {
    background-color: #1C85C7;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
}
button:hover {
    background-color: #1677a0;
}
.hidden {
    display: none;
}
#error-message, #error-message-pin {
    color: red;
}
#pin-circles {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}
</style>

<script>
document.getElementById('next').addEventListener('click', function() {
    const phoneInput = document.getElementById('phone').value;
    if (validatePhone(phoneInput)) {
        document.querySelector('.phone-input').classList.add('hidden');
        document.querySelector('.pin-input').classList.remove('hidden');
    } else {
        showError('Please enter a valid phone number.');
    }
});
