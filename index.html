        body {
            background-color: #1C85C7;

        .input-container {

        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin: 10px;
            width: 200px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .button {
            background-color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
